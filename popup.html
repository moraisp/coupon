<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupon Tester</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 320px;
      background: #f9fafb;
      color: #111827;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    main {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .coupon-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      background: white;
      color: #111827;
    }

    input[type="text"]:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
    }

    .model-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      color: #111827;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
    }

    select:disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
    }

    #model-status {
      font-size: 12px;
      color: #dc2626;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-primary:hover {
      background: #4338ca;
    }

    .btn-primary:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
      font-size: 12px;
      padding: 5px 10px;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-ai {
      width: 100%;
      background: #059669;
      color: white;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    .btn-ai:hover {
      background: #047857;
    }

    .btn-ai:disabled {
      background: #6ee7b7;
      cursor: not-allowed;
    }

    .actions-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .actions-row .btn-ai {
      width: auto;
      flex: 1;
      min-width: 90px;
    }

    .btn-collect {
      background: #0ea5e9;
      color: white;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .btn-collect:hover {
      background: #0284c7;
    }

    .btn-collect:disabled {
      background: #7dd3fc;
      cursor: not-allowed;
    }

    #status {
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      min-height: 36px;
      display: flex;
      align-items: center;
      flex: 1;
    }

    .status-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }

    .btn-stop {
      width: 36px;
      min-width: 36px;
      padding: 0;
      border: 1px solid #fecaca;
      border-radius: 6px;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }

    .btn-stop:hover {
      background: #fecaca;
    }

    #status.success {
      background: #f0fdf4;
      color: #15803d;
      border-color: #bbf7d0;
    }

    #status.error {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca;
    }

    #status.warning {
      background: #fffbeb;
      color: #d97706;
      border-color: #fde68a;
    }

    section.divider {
      border-top: 1px solid #e5e7eb;
      padding-top: 14px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 220px;
      overflow-y: auto;
    }

    #history-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      font-size: 12px;
    }

    #history-list li .code {
      font-family: monospace;
      font-weight: 600;
      color: #4f46e5;
      cursor: pointer;
    }

    #history-list li .code:hover {
      text-decoration: underline;
    }

    #history-list li .badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
    }

    .badge.success {
      background: #dcfce7;
      color: #15803d;
    }

    .badge.rejected {
      background: #fef9c3;
      color: #a16207;
    }

    .badge.error {
      background: #fee2e2;
      color: #dc2626;
    }

    .hidden {
      display: none !important;
    }

    .feedback-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
    }

    .notes-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 6px;
    }

    .notes-row textarea {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      background: white;
      color: #111827;
    }

    .notes-row textarea:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.15);
    }

    .feedback-btns {
      display: flex;
      gap: 6px;
    }

    .btn-feedback {
      padding: 4px 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-good {
      background: #dcfce7;
      color: #15803d;
    }

    .btn-good:hover { background: #bbf7d0; }

    .btn-bad {
      background: #fee2e2;
      color: #dc2626;
    }

    .btn-bad:hover { background: #fecaca; }

    .plan-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .plan-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .plan-date {
      font-size: 11px;
      color: #9ca3af;
    }

    .btn-icon {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    .btn-icon:hover { color: #dc2626; }

    .plan-preview {
      color: #374151;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plan-full {
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 4px;
    }

    #plans-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
  </style>
</head>
<body>
  <header id="ext-name">Coupon Tester</header>

  <main>
    <div class="model-row">
      <label class="section-title" for="model-select">Model</label>
      <select id="model-select">
        <option value="" disabled selected id="model-placeholder">Loading...</option>
      </select>
      <div id="model-status"></div>
    </div>

    <div class="actions-row">
      <button class="btn-ai" id="ollama-btn">Build Plan</button>
      <button class="btn-collect" id="collect-btn">Collect Coupons</button>
      <button class="btn-ai" id="test-btn">Test Coupons</button>
    </div>

    <div class="status-row">
      <div id="status"></div>
      <button class="btn-stop hidden" id="stop-btn" title="Stop">■</button>
    </div>

    <div id="feedback-row" class="feedback-row hidden">
      <span class="section-title" id="feedback-label"></span>
      <div class="feedback-btns">
        <button class="btn-feedback btn-good" id="feedback-good"></button>
        <button class="btn-feedback btn-bad"  id="feedback-bad"></button>
      </div>
    </div>

    <div id="notes-row" class="notes-row hidden">
      <label class="section-title" id="notes-label"></label>
      <textarea id="notes-input" rows="3" spellcheck="false"></textarea>
      <button class="btn-primary" id="notes-submit" id="notes-submit"></button>
    </div>

    <section class="divider hidden" id="history-section">
      <div class="section-header">
        <span class="section-title" id="history-title"></span>
        <button class="btn-secondary" id="clear-btn"></button>
      </div>
      <ul id="history-list"></ul>
    </section>

    <section class="divider hidden" id="plans-section">
      <div class="section-header">
        <span class="section-title" id="plans-title"></span>
        <button class="btn-secondary" id="clear-plans-btn"></button>
      </div>
      <ul id="plans-list"></ul>
    </section>
  </main>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
